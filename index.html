<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<meta name="theme-color" content="#ff7a00">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="apple-mobile-web-app-title" content="Spark Group">

<link rel="manifest" href="manifest.json">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#fff;
}

iframe{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

#splash{

position:fixed;
inset:0;
background:#fff;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

z-index:999999;

}

.loader{

width:42px;
height:42px;

border:4px solid #ddd;
border-top:4px solid #ff7a00;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}  

#installBtn{

display:none;

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

background:#ff7a00;

color:#fff;

border:none;

padding:14px 28px;

font-size:17px;

border-radius:30px;

cursor:pointer;

z-index:999999;

box-shadow:0 6px 18px rgba(0,0,0,.25);

}

</style>

</head>

<body>

<div id="splash">

<img
src="logo.png"
style="width:120px;margin-bottom:25px;">

<div class="loader"></div>

<div style="
margin-top:18px;
font-size:16px;
color:#666;
font-family:Arial;
">
Loading...
</div>

</div>

<iframe
id="appFrame"
style="display:none;"
src="https://script.google.com/macros/s/AKfycbz7Rx5C_TvMphuerz6bJqigg1EmSF17T_rwpBIvomo6YsG1RnLf1OyltorQ-Y_Piaxp/exec">
</iframe>

<button id="installBtn" onclick="installApp()">
Install App
</button>

<script>

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker.register("service-worker.js");

});

}

let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt=e;

document.getElementById("installBtn").style.display="block";

});

async function installApp(){

if(!deferredPrompt) return;

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt=null;

document.getElementById("installBtn").style.display="none";

}

window.addEventListener("appinstalled",()=>{

document.getElementById("installBtn").style.display="none";

});

window.addEventListener("load",()=>{

setTimeout(()=>{

document.getElementById("splash").style.display="none";

document.getElementById("appFrame").style.display="block";

},1500);

});  

</script>

</body>
</html>
