<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<meta name="theme-color" content="#ff7a00">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="apple-mobile-web-app-title" content="Spark Group">

<link rel="manifest" href="manifest.json">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#fff;
}

iframe{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

#splash{

position:fixed;
inset:0;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

overflow:hidden;

background:
radial-gradient(circle at 20% 20%,rgba(255,122,0,.08),transparent 40%),
radial-gradient(circle at 80% 80%,rgba(255,122,0,.10),transparent 35%),
linear-gradient(#ffffff,#fdfdfd);

z-index:999999;

}

.loader{

width:42px;
height:42px;

border:4px solid #ddd;
border-top:4px solid #ff7a00;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}  

#installBtn{

display:none;

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

background:#ff7a00;

color:#fff;

border:none;

padding:14px 28px;

font-size:17px;

border-radius:30px;

cursor:pointer;

z-index:999999;

box-shadow:0 6px 18px rgba(0,0,0,.25);

}

#splash::before{

content:"";

position:absolute;

left:-20%;

bottom:-140px;

width:140%;

height:280px;

background:rgba(255,122,0,.05);

border-radius:45%;

animation:wave 5s linear infinite;

}

#splash::after{

content:"";

position:absolute;

left:-10%;

bottom:-120px;

width:120%;

height:220px;

background:rgba(255,122,0,.08);

border-radius:45%;

animation:wave2 7s linear infinite;

}

@keyframes wave{

0%{
transform:translateX(0);
}

50%{
transform:translateX(40px);
}

100%{
transform:translateX(0);
}

}

@keyframes wave2{

0%{
transform:translateX(0);
}

50%{
transform:translateX(-35px);
}

100%{
transform:translateX(0);
}

}  

</style>

</head>

<body>

<div id="splash">

<img
src="https://drive.google.com/thumbnail?id=14cDI67g-vFxV9qWRLcYUGBl9TPqh_ozW&sz=w500"
style="width:120px;margin-bottom:25px;">

<div style="
margin-top:20px;
font-size:28px;
font-weight:bold;
color:#ff7a00;
font-family:Arial;
">
Welcome
</div>

<div style="
margin-top:8px;
font-size:18px;
color:#444;
font-family:Arial;
">
to
</div>

<div style="
margin-top:4px;
font-size:34px;
font-weight:700;
color:#222;
font-family:Arial;
letter-spacing:1px;
">
Spark Group
</div>

<div style="
margin-top:18px;
font-size:14px;
color:#888;
">
Please wait...
</div>

</div>

<iframe
id="appFrame"
style="display:none;"
src="https://script.google.com/macros/s/AKfycbz7Rx5C_TvMphuerz6bJqigg1EmSF17T_rwpBIvomo6YsG1RnLf1OyltorQ-Y_Piaxp/exec">
</iframe>

<button id="installBtn" onclick="installApp()">
Install App
</button>

<script>

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker.register("service-worker.js");

});

}

let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt=e;

document.getElementById("installBtn").style.display="block";

});

async function installApp(){

if(!deferredPrompt) return;

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt=null;

document.getElementById("installBtn").style.display="none";

}

window.addEventListener("appinstalled",()=>{

document.getElementById("installBtn").style.display="none";

});

window.addEventListener("load",()=>{

setTimeout(()=>{

document.getElementById("splash").style.display="none";

document.getElementById("appFrame").style.display="block";

},1500);

});  

</script>

</body>
</html>
