<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<meta name="theme-color" content="#ff7a00">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="apple-mobile-web-app-title" content="Spark Group">

<link rel="manifest" href="manifest.json">

<style>

  
*{
box-sizing:border-box;
margin:0;
padding:0;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#fff;
}

iframe{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

#installBtn{
display:none;
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#ff7a00;
color:#fff;
border:none;
padding:14px 28px;
font-size:17px;
border-radius:30px;
cursor:pointer;
z-index:999999;
box-shadow:0 6px 18px rgba(0,0,0,.25);
}

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
z-index:99999999;
transition:.6s;
}

.wave{
position:absolute;
width:250%;
height:250%;
background:
radial-gradient(circle,#ff7a0040 0%,transparent 60%);
animation:wave 5s linear infinite;
}

@keyframes wave{

0%{
transform:translate(-25%,-25%) rotate(0deg);
}

100%{
transform:translate(-25%,-25%) rotate(360deg);
}

}

.content{
position:relative;
z-index:2;
text-align:center;
}

.logo{
width:90px;
margin-bottom:15px;
animation:pop .8s;
}

@keyframes pop{

0%{
transform:scale(.7);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

.content h2{
font-size:20px;
font-weight:400;
color:#666;
}

.content h1{
margin-top:5px;
font-size:32px;
color:#ff7a00;
letter-spacing:2px;
}

.loading{

margin-top:20px;

font-size:18px;

color:#555;

font-weight:bold;

}

.loading span{

animation:blink 1.2s infinite;

}

.loading span:nth-child(2){

animation-delay:.2s;

}

.loading span:nth-child(3){

animation-delay:.4s;

}

@keyframes blink{

0%,100%{
opacity:0;
}

50%{
opacity:1;
}

}  

</style>

</head>

<body>

<div id="splash">

<div class="wave"></div>

<div class="content">

<img src="icon-192.png" class="logo">

<h2>Welcome to</h2>

<h1>SPARK GROUP</h1>

<div class="loading">
Loading<span>.</span><span>.</span><span>.</span>
</div>

</div>

</div>  

<iframe src="https://script.google.com/macros/s/AKfycbz7Rx5C_TvMphuerz6bJqigg1EmSF17T_rwpBIvomo6YsG1RnLf1OyltorQ-Y_Piaxp/exec"></iframe>

<button id="installBtn" onclick="installApp()">
Install App
</button>

<script>

if ("serviceWorker" in navigator){

window.addEventListener("load",async()=>{

const reg=await navigator.serviceWorker.register("sw.js");

reg.update();

});

}

let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt=e;

document.getElementById("installBtn").style.display="block";

});

async function installApp(){

if(!deferredPrompt) return;

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt=null;

document.getElementById("installBtn").style.display="none";

}

window.addEventListener("appinstalled",()=>{

document.getElementById("installBtn").style.display="none";

});

window.addEventListener("load",()=>{

setTimeout(()=>{

document.getElementById("splash").style.opacity="0";

setTimeout(()=>{

document.getElementById("splash").remove();

},600);

},1800);

});  

</script>

</body>
</html>
